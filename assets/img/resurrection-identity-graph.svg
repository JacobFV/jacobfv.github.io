<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" role="img" aria-labelledby="title desc" font-family="Inter, system-ui, Arial, sans-serif">
  <title id="title">A person is a recurrent causal structure</title>
  <desc id="desc">A dense recurrent causal graph stands for the person itself. The labels we hang on it are external compressions of the same topology. A self-modeling closure region marks where the system represents itself.</desc>
  <style>
    :root { --svg-primary: #0f172a; --svg-secondary: #64748b; --svg-muted: #94a3b8; --svg-soft: #475569; --svg-line: #cbd5e1; --svg-divider: #e2e8f0; --svg-inverse: #ffffff; }
    @media (prefers-color-scheme: dark) {
      :root { --svg-primary: #e5e7eb; --svg-secondary: #a1a1aa; --svg-muted: #71717a; --svg-soft: #cbd5e1; --svg-line: #52525b; --svg-divider: #3f3f46; --svg-inverse: #111827; }
    }
  </style>
  <defs>
    <marker id="loop" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L6,3.5 L0,7 Z" fill="var(--svg-primary)"/>
    </marker>
  </defs>

  <text x="60" y="56" font-size="22" font-weight="500" fill="var(--svg-primary)" letter-spacing="-0.01em">A person is a recurrent causal structure</text>
  <text x="60" y="80" font-size="13" fill="var(--svg-secondary)">Identity &#8801; the topology itself &#8212; not modules, not substrate, not biography. What can persist is the structure that keeps closing on itself.</text>

