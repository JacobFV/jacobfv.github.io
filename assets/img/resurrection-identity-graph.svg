    <path d="M510 290 C 540 300, 540 350, 552 370" marker-end="url(#loop)"/>
  </g>

  <!-- self-modeling closure region -->
  <g>
    <path d="M398 234 C 398 218, 432 214, 472 220 C 524 228, 552 246, 552 270 C 552 302, 522 314, 480 314 C 432 314, 398 298, 398 274 Z"
          fill="var(--svg-inverse)" stroke="var(--svg-primary)" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="475" y="158" text-anchor="middle" font-size="10" font-weight="600" fill="var(--svg-primary)" letter-spacing="0.08em">SELF-MODEL</text>
    <line x1="475" y1="164" x2="475" y2="218" stroke="var(--svg-primary)" stroke-width="0.8" stroke-dasharray="2 3"/>

    <!-- inner subgraph -->
    <g fill="none" stroke="var(--svg-primary)" stroke-width="0.8">
