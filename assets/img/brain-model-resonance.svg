<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="bg" cx="65%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1a0a14"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="cell" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ff2d6f"/>
      <stop offset="100%" stop-color="#7a0a2a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- sparse cortical connectivity matrix backdrop (23x23) -->
  <g transform="translate(70,110)" opacity="0.92">
    <rect x="-8" y="-8" width="386" height="386" fill="none" stroke="#2a2a2a" stroke-width="1"/>
    <text x="-8" y="-18" fill="#888" font-size="11" letter-spacing="2">CORTICAL CONNECTIVITY  M ∈ {0,1}²³ˣ²³</text>
    <g id="matrix"></g>
  </g>

  <!-- script-generated cells: hand-authored deterministic pattern resembling block-diagonal sparse cortical mask -->
  <g transform="translate(70,110)">
    <!-- diagonal blocks: sensory / association / motor families -->
    <!-- each cell 16x16 with 0.5 gap -->
    <!-- visual family: rows/cols 0-5 -->
    <g fill="url(#cell)">
      <rect x="0"  y="0"  width="14" height="14"/>
      <rect x="17" y="0"  width="14" height="14" opacity="0.7"/>
      <rect x="0"  y="17" width="14" height="14" opacity="0.7"/>
      <rect x="17" y="17" width="14" height="14"/>
      <rect x="34" y="17" width="14" height="14" opacity="0.5"/>
      <rect x="51" y="34" width="14" height="14"/>
      <rect x="34" y="51" width="14" height="14" opacity="0.6"/>
      <rect x="68" y="51" width="14" height="14" opacity="0.8"/>
      <rect x="51" y="68" width="14" height="14" opacity="0.5"/>
      <rect x="68" y="68" width="14" height="14"/>
      <rect x="85" y="85" width="14" height="14"/>
    </g>
    <!-- auditory block -->
    <g fill="url(#cell)">
      <rect x="102" y="102" width="14" height="14"/>
      <rect x="119" y="102" width="14" height="14" opacity="0.7"/>
      <rect x="102" y="119" width="14" height="14" opacity="0.7"/>
      <rect x="119" y="119" width="14" height="14"/>
      <rect x="136" y="119" width="14" height="14" opacity="0.6"/>
      <rect x="119" y="136" width="14" height="14" opacity="0.5"/>
      <rect x="136" y="136" width="14" height="14"/>
      <rect x="153" y="153" width="14" height="14" opacity="0.8"/>
    </g>
    <!-- association / language -->
    <g fill="url(#cell)">
      <rect x="170" y="170" width="14" height="14"/>
      <rect x="187" y="170" width="14" height="14" opacity="0.7"/>
      <rect x="170" y="187" width="14" height="14" opacity="0.6"/>
      <rect x="187" y="187" width="14" height="14"/>
      <rect x="204" y="187" width="14" height="14" opacity="0.55"/>
      <rect x="187" y="204" width="14" height="14" opacity="0.5"/>
      <rect x="204" y="204" width="14" height="14"/>
      <rect x="221" y="221" width="14" height="14"/>
      <rect x="238" y="238" width="14" height="14" opacity="0.8"/>
    </g>
    <!-- motor / control -->
    <g fill="url(#cell)">
      <rect x="255" y="255" width="14" height="14"/>
      <rect x="272" y="255" width="14" height="14" opacity="0.6"/>
      <rect x="255" y="272" width="14" height="14" opacity="0.6"/>
      <rect x="272" y="272" width="14" height="14"/>
      <rect x="289" y="289" width="14" height="14"/>
      <rect x="306" y="306" width="14" height="14" opacity="0.7"/>
      <rect x="323" y="323" width="14" height="14"/>
      <rect x="340" y="340" width="14" height="14" opacity="0.8"/>
      <rect x="357" y="357" width="14" height="14"/>
    </g>
    <!-- cross-region long-range edges -->
    <g fill="#ff2d6f" opacity="0.55">
      <rect x="153" y="34"  width="14" height="14"/>
      <rect x="34"  y="153" width="14" height="14"/>
      <rect x="221" y="102" width="14" height="14"/>
      <rect x="102" y="221" width="14" height="14"/>
      <rect x="289" y="170" width="14" height="14"/>
      <rect x="170" y="289" width="14" height="14"/>
      <rect x="340" y="68"  width="14" height="14"/>
      <rect x="68"  y="340" width="14" height="14"/>
    </g>
  </g>

  <!-- right side: title + 6D affect vector + caption -->
  <g transform="translate(560,150)" fill="#fff">
    <text x="0" y="0" font-size="64" font-weight="700" letter-spacing="-1">brain-model</text>
    <text x="0" y="44" font-size="22" fill="#bbb">cortical dynamics → affect geometry → music</text>

    <!-- 6D affect vector -->
    <g transform="translate(0,90)" font-size="14" font-family="Menlo, Monaco, monospace">
      <text x="0" y="0" fill="#888" letter-spacing="2">AFFECT  a ∈ ℝ⁶</text>

      <g transform="translate(0,18)">
        <rect x="0"   y="0" width="86" height="64" fill="none" stroke="#ff2d6f"/>
        <rect x="92"  y="0" width="86" height="64" fill="none" stroke="#ff2d6f"/>
        <rect x="184" y="0" width="86" height="64" fill="none" stroke="#ff2d6f"/>
        <rect x="276" y="0" width="86" height="64" fill="none" stroke="#ff2d6f"/>
        <rect x="368" y="0" width="86" height="64" fill="none" stroke="#ff2d6f"/>
        <rect x="460" y="0" width="86" height="64" fill="none" stroke="#ff2d6f"/>

        <g fill="#ff2d6f" font-size="22" font-weight="700" text-anchor="middle">
          <text x="43"  y="30">𝒱</text>
          <text x="135" y="30">𝒜</text>
          <text x="227" y="30">Φ</text>
          <text x="319" y="30">r_eff</text>
          <text x="411" y="30">𝒞ℱ</text>
          <text x="503" y="30">𝒮ℳ</text>
        </g>
        <g fill="#888" font-size="10" text-anchor="middle" letter-spacing="1">
          <text x="43"  y="52">VALENCE</text>
          <text x="135" y="52">AROUSAL</text>
          <text x="227" y="52">INTEGRATION</text>
          <text x="319" y="52">EFF. RANK</text>
          <text x="411" y="52">CF WEIGHT</text>
          <text x="503" y="52">SELF-MODEL</text>
        </g>
      </g>
    </g>

    <!-- objective -->
    <g transform="translate(0,220)" font-family="Menlo, Monaco, monospace" font-size="14">
      <text x="0" y="0" fill="#888" letter-spacing="2">FLOURISHING</text>
      <text x="0" y="24" fill="#eee">ℱ(a) = α₁𝒱 + α₂Φ + α₃r_eff − α₄(𝒮ℳ − 𝒮ℳ_opt)²</text>
      <text x="0" y="54" fill="#888" letter-spacing="2">RESONANCE</text>
      <text x="0" y="78" fill="#eee">Beauty ∝ MI(stimulus structure ; internal model structure)</text>
    </g>

    <text x="0" y="370" fill="#777" font-size="13">TRIBE v2 · canvas-engineering · HIX · Resonance</text>
  </g>

  <!-- legend under matrix -->
  <g transform="translate(70,520)" fill="#888" font-size="11" letter-spacing="2">
    <text x="0" y="0">23 REGIONS · 19.6% DENSITY · R²=0.837 · BCI 68.8%</text>
  </g>
</svg>
