<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Off-diagonal causal structure</title>
  <desc id="desc">A matrix-like diagram contrasting local diagonal causality with weaker long-range, cross-scale, historically mediated couplings.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <linearGradient id="diag" x1="0" x2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <rect width="980" height="520" fill="#f8fafc"/>
  <text x="60" y="58" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Main diagonal vs. off-diagonal causality</text>
  <text x="60" y="92" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">Local mechanisms dominate, but human-scale identity also rides on distributed, historical, and symbolic correlations.</text>

  <g transform="translate(70 140)">
    <rect x="0" y="0" width="320" height="320" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <g stroke="#e2e8f0">
      <path d="M80 0V320M160 0V320M240 0V320M0 80H320M0 160H320M0 240H320"/>
    </g>
    <g fill="url(#diag)">
      <rect x="14" y="14" width="52" height="52" rx="10"/>
      <rect x="94" y="94" width="52" height="52" rx="10"/>
      <rect x="174" y="174" width="52" height="52" rx="10"/>
      <rect x="254" y="254" width="52" height="52" rx="10"/>
    </g>
    <g fill="#f59e0b" opacity="0.85">
      <circle cx="120" cy="40" r="10"/>
      <circle cx="280" cy="120" r="10"/>
      <circle cx="40" cy="200" r="10"/>
      <circle cx="200" cy="280" r="10"/>
      <circle cx="280" cy="40" r="7"/>
      <circle cx="120" cy="280" r="7"/>
    </g>
    <text x="15" y="354" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">diagonal = local causal couplings</text>
    <text x="15" y="378" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">off-diagonal = weak/non-obvious correlations</text>
  </g>

  <g transform="translate(470 138)" font-family="Inter, Arial, sans-serif">
    <rect x="0" y="0" width="430" height="324" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="28" y="42" font-size="20" font-weight="700" fill="#0f172a">Three tiers</text>
    <g transform="translate(28 78)">
      <circle cx="12" cy="12" r="10" fill="#2563eb"/>
      <text x="36" y="18" font-size="16" font-weight="700" fill="#0f172a">ordinary distributed causality</text>
      <text x="36" y="43" font-size="14" fill="#64748b">records, institutions, memories, descendants</text>
    </g>
    <g transform="translate(28 154)">
      <circle cx="12" cy="12" r="10" fill="#14b8a6"/>
      <text x="36" y="18" font-size="16" font-weight="700" fill="#0f172a">latent reconstruction</text>
      <text x="36" y="43" font-size="14" fill="#64748b">future systems infer missing structure from traces</text>
    </g>
    <g transform="translate(28 230)">
      <circle cx="12" cy="12" r="10" fill="#f59e0b"/>
      <text x="36" y="18" font-size="16" font-weight="700" fill="#0f172a">speculative historical bias</text>
      <text x="36" y="43" font-size="14" fill="#64748b">prior identity curvature nudges underdetermined futures</text>
    </g>
  </g>
</svg>
