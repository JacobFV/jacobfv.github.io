{%- if page.cover_image -%}
<figure class="post-cover">
  <img src="{{ page.cover_image | relative_url }}" alt="{{ page.cover_alt | default: page.title | escape }}">
  {%- if page.cover_credit or page.cover_credit_url -%}
  <figcaption>
    {%- if page.cover_credit_url -%}
    Image credit: <a href="{{ page.cover_credit_url }}" target="_blank" rel="noopener noreferrer">{{ page.cover_credit | default: page.cover_credit_url }}</a>
    {%- else -%}
    Image credit: {{ page.cover_credit }}
    {%- endif -%}
  </figcaption>
  {%- endif -%}
</figure>
{%- endif -%}
