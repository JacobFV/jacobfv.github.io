{%- if site.data.tts -%}
{%- assign tts = site.data.tts[page.path] -%}
{%- if tts and tts.audio -%}
<section class="post-tts" aria-label="Post audio">
  <div class="post-tts__label">
    <i class="fas fa-volume-up fa-sm" aria-hidden="true"></i>
    <span>Listen to this post</span>
  </div>
  <audio controls preload="none">
    <source src="{{ tts.audio | relative_url }}" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
</section>
{%- endif -%}
{%- endif -%}
